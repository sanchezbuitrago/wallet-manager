server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /auth/ {
        proxy_pass http://fastapi:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /analytics/ {
        proxy_pass http://fastapi:8000/analytics/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
