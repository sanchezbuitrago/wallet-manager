version: "3.9"

services:
  mongodb:
    container_name: mongodb_wallet_manager
    image: mongo:latest
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.sh:/usr/local/bin/mongo-init.sh
    entrypoint: ["bash", "/usr/local/bin/mongo-init.sh"]
    networks:
      - n8n_evoapi

  mongoexpress:
    container_name: mongoexpress_wallet_manager
    image: mongo-express
    restart: always
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "False"
      ME_CONFIG_BASICAUTH_USERNAME: username
      ME_CONFIG_BASICAUTH_PASSWORD: password
    ports:
      - "127.0.0.1:8084:8081"
    depends_on:
      - mongodb
    networks:
      - n8n_evoapi

  fastapi:
    container_name: wallet_manager
    build: .
    volumes:
      - media_storage:/app/storage/media
    restart: always
    env_file:
      - .env
    networks:
      - n8n_evoapi
    depends_on:
      - mongodb

  postgres:
    image: postgres:15
    container_name: evolution_postgres_wallet_manager
    restart: always
    environment:
      POSTGRES_USER: evouser
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: evolutiondb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_evoapi

  redis:
    image: redis:7
    container_name: evolution_redis_wallet_manager
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    env_file:
      - .env
    networks:
      - n8n_evoapi

  evolution-api:
    container_name: evolution_api_wallet_manager
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - n8n_evoapi

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_wallet_manager
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.wallet-manager.sbapps.dev
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.wallet-manager.sbapps.dev/
      - GENERIC_TIMEZONE=America/Bogota
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_evoapi

  web:
    container_name: web_wallet_manager
    build:
      context: ../web
      args:
        VITE_API_URL: https://api.wallet-manager.sbapps.dev
    restart: always
    networks:
      - n8n_evoapi
    depends_on:
      - fastapi

  caddy:
    image: caddy:2-alpine
    container_name: caddy_wallet_manager
    restart: unless-stopped
    entrypoint: /bin/sh /etc/caddy/entrypoint.sh
    ports:
      - "80:80"
      - "443:443"
    environment:
      - EVO_API_USER=${EVO_API_USER}
      - EVO_API_PASSWORD=${EVO_API_PASSWORD}
    volumes:
      - ./Caddyfile.tmpl:/etc/caddy/Caddyfile.tmpl:ro
      - ./entrypoint-caddy.sh:/etc/caddy/entrypoint.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - n8n_evoapi
    depends_on:
      - web
      - fastapi
      - n8n

  backup:
    container_name: backup_wallet_manager
    build: ./backup
    restart: unless-stopped
    environment:
      - S3_BUCKET=${S3_BUCKET}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - mongo_data:/backup/mongodb:ro
      - n8n_data:/backup/n8n:ro
      - evolution_instances:/backup/evolution:ro
      - media_storage:/backup/media:ro
    networks:
      - n8n_evoapi

networks:
  n8n_evoapi:

volumes:
  postgres_data:
  evolution_instances:
  mongo_data:
  n8n_data:
  media_storage:
  caddy_data:
  caddy_config:
