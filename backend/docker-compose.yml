version: "3.9"

services:
  mongodb:
    container_name: mongodb_wallet_manager
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - n8n_evoapi

  mongoexpress:
    container_name: mongoexpress_wallet_manager
    image: mongo-express
    restart: always
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "False"
      ME_CONFIG_BASICAUTH_USERNAME: username
      ME_CONFIG_BASICAUTH_PASSWORD: password
    ports:
      - "8084:8081"
    depends_on:
      - mongodb
    networks:
      - n8n_evoapi

  fastapi:
    container_name: wallet_manager
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: always
    env_file:
      - .env
    networks:
      - n8n_evoapi
    depends_on:
      - mongodb

  postgres:
    image: postgres:15
    container_name: evolution_postgres_wallet_manager
    restart: always
    environment:
      POSTGRES_USER: evouser
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: evolutiondb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_evoapi

  redis:
    image: redis:7
    container_name: evolution_redis_wallet_manager
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    env_file:
      - .env
    networks:
      - n8n_evoapi

  evolution-api:
    container_name: evolution_api_wallet_manager
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    ports:
      - "8080:8080"
    labels:
      - traefik.enable=true
      - traefik.http.routers.evolution.rule=Host(`evolution.localhost`)
      - traefik.http.routers.evolution.entrypoints=web,websecure
      - traefik.http.routers.evolution.tls=true
      - traefik.http.routers.evolution.tls.certresolver=mytlschallenge
      - traefik.http.routers.evolution.middlewares=evolution-headers@docker
      - traefik.http.middlewares.evolution-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.evolution-headers.headers.STSSeconds=315360000
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - n8n_evoapi
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_wallet_manager
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/ # Cambia por tu IP/Dominio público si expones n8n
      - GENERIC_TIMEZONE=America/Bogota
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_evoapi

networks:
  n8n_evoapi:

volumes:
  postgres_data:
  evolution_instances:
  mongo_data:
  n8n_data:

